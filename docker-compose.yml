version: '3.8'

services:
  # Redis服务
  redis:
    image: redis:7-alpine
    container_name: bidcraft-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bidcraft-network

  # MinIO对象存储服务
  minio:
    image: minio/minio:latest
    container_name: bidcraft-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - bidcraft-network

  # Qdrant向量数据库服务
  qdrant:
    image: qdrant/qdrant:latest
    container_name: bidcraft-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bidcraft-network

  # 后端API服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bidcraft-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backend:/app/backend
    environment:
      - REDIS__HOST=redis
      - REDIS__PORT=6379
      - MINIO__ENDPOINT=minio:9000
      - MINIO__ACCESS_KEY=minioadmin
      - MINIO__SECRET_KEY=minioadmin
      - QDRANT__HOST=qdrant
      - QDRANT__PORT=6333
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_healthy
    networks:
      - bidcraft-network

  # 前端开发服务（可选）
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: bidcraft-frontend
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ./frontend/src:/app/src
  #   environment:
  #     - REACT_APP_API_URL=http://localhost:8000
  #   depends_on:
  #     - backend
  #   networks:
  #     - bidcraft-network

volumes:
  redis_data:
  minio_data:
  qdrant_data:

networks:
  bidcraft-network:
    driver: bridge
